# ~/.config/yazi/yazi.toml

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "none"
show_hidden = true
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll"]

[preview]
wrap = "yes"
tab_size = 2
max_width = 1800
max_height = 1800
cache_dir = ""

[opener]
edit = [
  { run = '${EDITOR:-vim} "$@"', block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$1"', desc = "Open", for = "linux" },
  { run = 'open "$1"', desc = "Open", for = "macos" },
]

[open]
prepend_rules = [
  { name = "*.md", use = "edit" },
  { name = "*.toml", use = "edit" },
  { name = "*.yaml", use = "edit" },
  { name = "*.yml", use = "edit" },
  { name = "*.json", use = "edit" },
  { name = "*.lua", use = "edit" },
  { name = "*.py", use = "edit" },
  { name = "*.js", use = "edit" },
  { name = "*.ts", use = "edit" },
  { name = "*.tsx", use = "edit" },
  { name = "*.sh", use = "edit" },
  { name = "*.zsh", use = "edit" },
]

[input]
cursor_blink = false

[which]
sort_by = "key"
sort_sensitive = false
sort_reverse = false
