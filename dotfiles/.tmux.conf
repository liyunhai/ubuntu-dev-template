###############################################################################
# ~/.tmux.conf
#
# 目标：
#   - 为开发模板提供一个现代、稳妥、尽量通用的 tmux 默认配置
#   - 同时兼容 WSL Ubuntu 24.04 与 macOS OrbStack 中的 Ubuntu
#   - 使用 TPM 管理插件，Catppuccin 提供主题
#
# 设计策略：
#   - 保持配置直观，尽量少魔改
#   - 优先保证可维护性和跨环境一致性
#   - 复制/恢复/主题/常用窗口行为一步到位
#
# 参考：
#   - tmux 官方默认 prefix 是 C-b，这里改成 C-a
#   - TPM 负责插件安装与加载
#   - Catppuccin for tmux 需要 tmux >= 3.2
###############################################################################

##### 基础行为 ################################################################

# 把前缀从默认的 Ctrl-b 改为 Ctrl-a
# 这样对很多长期使用终端的人来说更顺手。
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 使用 vi 风格键位进行 copy mode / 命令模式操作
setw -g mode-keys vi

# 开启鼠标支持：
# - 可用鼠标切 pane、选窗口、拖动调整大小、滚动历史
set -g mouse on

# 允许窗口和 pane 从 1 开始编号，而不是从 0 开始
set -g base-index 1
setw -g pane-base-index 1

# 关闭和新建窗口后自动重新编号，保持顺序整洁
set -g renumber-windows on

# 增大历史滚动缓冲区，方便查看大量日志
set -g history-limit 100000

# 更快的 ESC 响应，减少 vi 模式和某些快捷键的延迟感
set -sg escape-time 10

# 默认终端能力设置
# screen-256color 在兼容性上比较稳妥
set -g default-terminal "screen-256color"

# 尽可能启用真彩色支持
# 这对 Catppuccin 主题表现很重要
set -as terminal-features ',xterm-256color:RGB'
set -ga terminal-overrides ',*:Tc'

##### 分屏与窗口操作 ###########################################################

# 更符合直觉的分屏快捷键
# | 横向分屏（左右）
bind | split-window -h

# - 纵向分屏（上下）
bind - split-window -v

# 重新载入配置
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# 使用 hjkl 在 pane 之间移动
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 使用 Ctrl + hjkl 调整 pane 大小
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# 快速创建窗口
bind c new-window -c "#{pane_current_path}"

# 新 split 时继承当前 pane 路径，保持开发体验一致
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

##### 状态栏 ###################################################################

# 状态栏刷新间隔
set -g status-interval 5

# 状态栏位置：底部
set -g status-position bottom

# 左侧显示 session 名称
set -g status-left-length 50
set -g status-left "#[bold] #S "

# 右侧显示主机名、当前目录、时间
# 这里保持简洁，主题会再接管一部分样式
set -g status-right-length 100
set -g status-right "#H | #{pane_current_path} | %Y-%m-%d %H:%M"

##### 复制模式 #################################################################

# vi 风格复制：
# 在 copy-mode-vi 里，用 v 开始选择，用 y 复制
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

##### 插件管理（TPM） ##########################################################

# TPM 自身
set -g @plugin 'tmux-plugins/tpm'

# 提供一组更合理的默认值
set -g @plugin 'tmux-plugins/tmux-sensible'

# 复制增强
set -g @plugin 'tmux-plugins/tmux-yank'

# 会话保存 / 恢复
set -g @plugin 'tmux-plugins/tmux-resurrect'

# 自动持续保存并在启动时恢复（依赖 resurrect）
set -g @plugin 'tmux-plugins/tmux-continuum'

# 主题
set -g @plugin 'catppuccin/tmux'

##### tmux-resurrect / continuum 配置 ##########################################

# continuum 自动保存
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# resurrect 保存更多 pane 内容
set -g @resurrect-capture-pane-contents 'on'

##### Catppuccin 配置 ##########################################################

# 主题风格：latte / frappe / macchiato / mocha
# 这里默认使用 mocha，适合深色终端
set -g @catppuccin_flavor 'mocha'

# 窗口文本默认显示简洁一些
set -g @catppuccin_window_status_style "rounded"

# 状态栏模块可按个人习惯再扩展
# 这里先保持克制，避免模板过重
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"

##### TPM 启动 #################################################################

# 这行必须放在插件列表的最后附近。
# TPM 依靠它进行插件加载。
run '~/.tmux/plugins/tpm/tpm'
