# nginx static-site example with a dedicated root directory.

server {
    listen 80;
    listen [::]:80;
    server_name static.local;

    root /home/YOUR_USER/workspace/apps/static-site/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/static.access.log;
    error_log  /var/log/nginx/static.error.log;
}
