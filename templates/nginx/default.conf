# Default nginx server block example for a local static site.
#
# Usage:
#   1. Copy into /etc/nginx/sites-available/<name>
#   2. Adjust `server_name` and `root`
#   3. Symlink into /etc/nginx/sites-enabled/
#   4. Validate with: sudo nginx -t
#   5. Reload with: sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name example.local;

    root /home/YOUR_USER/workspace/apps/example/public;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/example.access.log;
    error_log  /var/log/nginx/example.error.log;
}
